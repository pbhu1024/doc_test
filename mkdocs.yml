site_name: Auto Research
site_url: https://pbhu1024.github.io/doc_test/
repo_name: pbhu1024/auto_research
repo_url: https://github.com/pbhu1024/doc_test

theme:
  name: material
  palette:
    # 暗色模式 - 赛博朋克风
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/weather-night
        name: 暗色模式
    # 亮色模式
    - scheme: default
      primary: deep purple
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: 亮色模式

  font:
    text: Roboto
    code: JetBrains Mono

  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.top
    - search.highlight
    - search.suggest
    - search.share
    - content.code.copy
    - content.code.annotate

extra_css:
  - extra.css

nav:
  - 首页:
    - 项目概述: index.md
    - 功能特性: home/features.md
    - 系统架构: home/architecture.md
    - 更新日志: home/changelog.md
  - 快速开始:
    - 安装指南: getting-started/installation.md
    - 配置说明: getting-started/configuration.md
    - 快速教程: getting-started/quick-tutorial.md
    - 常见问题: getting-started/faq.md
  - API 文档:
    - API 概览: api/overview.md
    - ResearchEngine: api/engine.md
    - 数据源接口: api/datasource.md
    - CLI 命令: api/cli.md
    - 错误处理: api/errors.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

plugins:
  - search
